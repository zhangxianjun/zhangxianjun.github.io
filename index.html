<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        * {
            padding: 0;
            margin: 0;
        }
        div {
            width: 100%;
            height: 120px;
        }
        .ab {
            position: absolute;
            background-color: blue;
        }
        .re {
            position: absolute;
            background-color: red;
        }
        .fi {
            position: absolute;
            background-color: yellow;
        }
        .st {
            position: absolute;
            background-color: lightgrey;
        }
    </style>
</head>
<body>
<div class="ab">
</div>
<div class="re">
</div>
<div class="fi">
</div>
<div class="st">
</div>
</body>
</html>
